<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a0a00">
<meta name="description" content="بطولة مجلس الحزم ٢٠٢٦/٢٠٢٧">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="مجلس الحزم">
<link rel="manifest" href="#" id="manifest-link">
<title>🃏 بطولة مجلس الحزم ٢٠٢٦/٢٠٢٧</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js" crossorigin="anonymous" onerror="document.body.innerHTML='<div style=\'font-family:sans-serif;padding:40px;color:#f5e6cc;background:#0d0600;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center\'><div><div style=\'font-size:48px;margin-bottom:16px\'>⚠️</div><h2 style=\'color:#f0c040;margin-bottom:12px\'>خطأ في التحميل</h2><p style=\'color:#8a6a40;margin-bottom:20px\'>تأكد من اتصالك بالإنترنت ثم أعد تحميل الصفحة</p><button onclick=\"location.reload()\" style=\'background:#c8960c;color:#1a0a00;border:none;padding:12px 24px;border-radius:8px;font-size:16px;cursor:pointer;font-weight:700\'>🔄 إعادة التحميل</button></div></div>'"></script>
<style>
:root {
  --bg:#0d0600;--bg2:#1a0c02;--bg3:#251208;
  --gold:#c8960c;--gold2:#f0c040;--gold3:#ffd966;
  --red:#b91c1c;--red2:#dc2626;
  --green:#15803d;--green2:#16a34a;
  --card:#1e1006;--card2:#2a1608;--border:#3d2007;
  --text:#f5e6cc;--text2:#c8a87a;--text3:#8a6a40;
  --shadow:0 8px 40px rgba(0,0,0,0.8);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh;overflow-x:hidden;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(200,150,12,.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(185,28,28,.08) 0%,transparent 50%);}
body::before{content:'♠ ♥ ♦ ♣';position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:400px;color:rgba(255,255,255,.015);white-space:nowrap;pointer-events:none;z-index:0;letter-spacing:60px;}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(200,150,12,.1) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(185,28,28,.1) 0%,transparent 50%);}
.login-box{width:100%;max-width:360px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 22px;box-shadow:var(--shadow);}
.login-logo{text-align:center;margin-bottom:20px;}
.login-logo .suits{font-size:28px;letter-spacing:10px;margin-bottom:6px;background:linear-gradient(135deg,var(--gold),var(--red2),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.login-logo h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--gold3),var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 10px rgba(200,150,12,.4));}
.login-logo p{font-size:11px;color:var(--text3);margin-top:3px;}
.login-label{font-size:12px;color:var(--text3);margin-bottom:7px;display:block;}
.player-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:18px;}
.player-select-btn{padding:9px 7px;border:1.5px solid var(--border);background:var(--bg3);border-radius:8px;cursor:pointer;color:var(--text2);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;transition:all .2s;text-align:center;}
.player-select-btn:hover{border-color:var(--gold);color:var(--gold);}
.player-select-btn.selected{background:rgba(200,150,12,.15);border-color:var(--gold2);color:var(--gold2);}
.pin-label{font-size:12px;color:var(--text3);margin-bottom:8px;text-align:center;}
.pin-display{display:flex;justify-content:center;gap:10px;margin-bottom:14px;}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border);background:var(--bg3);transition:all .2s;}
.pin-dot.filled{background:var(--gold2);border-color:var(--gold2);box-shadow:0 0 8px rgba(200,150,12,.5);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px;}
.pin-key{padding:13px;border:1px solid var(--border);background:var(--bg3);border-radius:8px;cursor:pointer;color:var(--text);font-family:'Tajawal',sans-serif;font-size:18px;font-weight:700;transition:all .2s;text-align:center;user-select:none;}
.pin-key:hover{background:var(--card2);border-color:var(--gold);}
.pin-key:active{transform:scale(.95);background:rgba(200,150,12,.1);}
.pin-key.del{color:var(--red2);font-size:14px;}
.login-btn{width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a0c02;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:900;cursor:pointer;transition:all .2s;box-shadow:0 0 20px rgba(200,150,12,.3);}
.login-btn:hover{box-shadow:0 0 30px rgba(200,150,12,.5);}
.login-error{color:var(--red2);text-align:center;font-size:12px;margin-top:7px;min-height:18px;}

/* APP */
#app{display:none;}
.container{max-width:900px;margin:0 auto;padding:0 14px 100px;position:relative;z-index:1;}
header{text-align:center;padding:24px 16px 18px;border-bottom:1px solid var(--border);}
.header-suits{font-size:20px;letter-spacing:8px;margin-bottom:7px;background:linear-gradient(135deg,var(--gold),var(--red2),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
h1{font-family:'Playfair Display',serif;font-size:clamp(20px,5vw,40px);font-weight:900;background:linear-gradient(135deg,var(--gold3),var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 20px rgba(200,150,12,.4));line-height:1.1;margin-bottom:4px;}
.subtitle{color:var(--text3);font-size:11px;letter-spacing:2px;text-transform:uppercase;}
.user-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;}
.user-badge{background:linear-gradient(135deg,rgba(200,150,12,.15),rgba(200,150,12,.05));border:1px solid rgba(200,150,12,.4);border-radius:20px;padding:5px 14px;font-size:13px;font-weight:700;color:var(--gold2);}
.logout-btn{background:none;border:1px solid var(--border);color:var(--text3);padding:5px 10px;border-radius:20px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:11px;transition:all .2s;}
.logout-btn:hover{border-color:var(--red);color:var(--red2);}
.stats-bar{display:flex;justify-content:center;gap:12px;margin-top:14px;flex-wrap:wrap;}
.stat-item{text-align:center;padding:7px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;}
.stat-num{font-size:18px;font-weight:900;color:var(--gold2);display:block;}
.stat-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;}
nav{display:flex;gap:4px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;position:sticky;top:0;background:var(--bg);z-index:100;border-bottom:1px solid var(--border);margin:0 -14px;}
nav::-webkit-scrollbar{display:none;}
.tab-btn{flex-shrink:0;padding:7px 13px;border:1px solid var(--border);background:var(--card);color:var(--text3);border-radius:6px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:500;transition:all .2s;white-space:nowrap;}
.tab-btn:hover{border-color:var(--gold);color:var(--gold);}
.tab-btn.active{background:linear-gradient(135deg,var(--gold),var(--gold2));border-color:var(--gold);color:#1a0c02;font-weight:700;box-shadow:0 0 15px rgba(200,150,12,.4);}
.section{display:none;padding-top:14px;}
.section.active{display:block;}

/* SCOREBOARD */
.scoreboard{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:14px;}
.scoreboard-header{background:linear-gradient(135deg,#2a1608,#1a0c02);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.scoreboard-title{font-size:15px;font-weight:700;color:var(--gold2);}
.player-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(61,32,7,.5);gap:10px;transition:background .2s;}
.player-row:hover{background:var(--card2);}
.player-row:last-child{border-bottom:none;}
.rank-badge{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;flex-shrink:0;}
.rank-1{background:linear-gradient(135deg,#ffd700,#ffb300);color:#1a0a00;}
.rank-2{background:linear-gradient(135deg,#c0c0c0,#a0a0a0);color:#1a0a00;}
.rank-3{background:linear-gradient(135deg,#cd7f32,#8b4513);color:#fff;}
.rank-other{background:var(--bg3);color:var(--text3);border:1px solid var(--border);}
.player-name{flex:1;font-size:14px;font-weight:500;}
.player-name.leader{color:var(--gold2);font-weight:700;}
.player-wins{font-size:18px;font-weight:900;color:var(--gold);min-width:32px;text-align:left;}
.score-bar-wrap{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.score-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .6s ease;}
.progress-section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px;}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.progress-label{font-size:12px;color:var(--text3);}
.progress-val{font-size:12px;font-weight:700;color:var(--gold2);}
.progress-bar-wrap{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.progress-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold3));transition:width .5s ease;}
.highlight-card{background:linear-gradient(135deg,rgba(200,150,12,.1),rgba(200,150,12,.03));border:1px solid rgba(200,150,12,.4);border-radius:10px;padding:12px;margin-bottom:12px;text-align:center;}
.leader-name{font-size:22px;font-weight:900;color:var(--gold2);}
.leader-pts{font-size:12px;color:var(--text3);margin-top:3px;}
@keyframes glow-pulse{0%,100%{filter:drop-shadow(0 0 8px rgba(200,150,12,.6));}50%{filter:drop-shadow(0 0 20px rgba(200,150,12,1));}}
.trophy-icon{animation:glow-pulse 2s ease-in-out infinite;}

/* MATCHES */
.round-section{margin-bottom:14px;}
.round-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.round-label{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:2px;background:var(--card);border:1px solid var(--border);padding:3px 10px;border-radius:20px;}
.round-line{flex:1;height:1px;background:var(--border);}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:7px;transition:all .2s;position:relative;overflow:hidden;}
.match-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);transition:background .2s;}
.match-card.locked::before{background:var(--gold2);}
.match-card.pending-confirm::before{background:var(--green2);}
.match-num{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:1px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;}
.match-status-badge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700;}
.badge-locked{background:rgba(200,150,12,.2);color:var(--gold2);border:1px solid var(--gold);}
.badge-pending{background:rgba(21,128,61,.2);color:var(--green2);border:1px solid var(--green);}
.badge-open{background:var(--bg3);color:var(--text3);border:1px solid var(--border);}
.match-teams{display:flex;align-items:center;gap:6px;}
.team-btn{flex:1;padding:9px 8px;border:1.5px solid var(--border);background:var(--bg3);border-radius:8px;cursor:pointer;text-align:center;font-family:'Tajawal',sans-serif;color:var(--text2);font-size:12px;font-weight:600;transition:all .2s;line-height:1.4;}
.team-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold);background:var(--card2);}
.team-btn.winner{background:linear-gradient(135deg,rgba(200,150,12,.2),rgba(240,192,64,.1));border-color:var(--gold);color:var(--gold2);box-shadow:0 0 10px rgba(200,150,12,.3);}
.team-btn.loser{opacity:.35;}
.team-btn:disabled{cursor:not-allowed;}
.vs-badge{font-size:9px;font-weight:900;color:var(--text3);background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:3px 4px;flex-shrink:0;}
.confirm-section{margin-top:9px;padding-top:9px;border-top:1px solid var(--border);}
.confirm-title{font-size:10px;color:var(--text3);margin-bottom:7px;}
.confirm-avatars{display:flex;gap:5px;flex-wrap:wrap;}
.confirm-avatar{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid var(--border);}
.confirm-avatar.confirmed{background:rgba(21,128,61,.2);border-color:var(--green2);color:var(--green2);}
.confirm-avatar.pending-conf{background:var(--bg3);color:var(--text3);}
.my-confirm-btn{margin-top:7px;width:100%;padding:8px;border:none;border-radius:7px;background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
.my-confirm-btn:hover{box-shadow:0 0 12px rgba(21,128,61,.4);}
.my-confirm-btn.already{background:var(--bg3);color:var(--text3);border:1px solid var(--border);cursor:default;}
.not-in-match-note{font-size:10px;color:var(--text3);text-align:center;margin-top:6px;font-style:italic;}
.filter-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.filter-chip{padding:5px 11px;border:1px solid var(--border);background:var(--card);color:var(--text3);border-radius:20px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:11px;transition:all .2s;}
.filter-chip.active{border-color:var(--gold);color:var(--gold2);background:rgba(200,150,12,.1);}
.search-wrap{position:relative;margin-bottom:10px;}
.search-box{width:100%;padding:16px 50px 16px 16px;background:var(--card);border:2px solid var(--border);border-radius:14px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:16px;outline:none;transition:all .2s;direction:rtl;}
.search-box:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,150,12,.15);}
.search-box::placeholder{color:var(--text3);}
.search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:20px;pointer-events:none;}
.search-clear{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:15px;cursor:pointer;color:var(--text3);background:none;border:none;padding:4px;display:none;}
.search-hint{font-size:11px;color:var(--text3);margin-bottom:8px;padding:0 2px;}
.section-title{font-size:14px;font-weight:700;color:var(--gold2);margin-bottom:10px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.bnav-btn{flex:1;padding:10px 4px 8px;border:none;background:none;color:var(--text3);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:9px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s;}
.bnav-btn .icon{font-size:17px;}
.bnav-btn.active{color:var(--gold2);}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--gold);color:var(--gold2);padding:9px 20px;border-radius:50px;font-size:12px;font-weight:600;z-index:1000;opacity:0;transition:all .3s;white-space:nowrap;box-shadow:0 0 20px rgba(200,150,12,.4);max-width:90vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.loading{text-align:center;padding:40px;color:var(--text3);font-size:13px;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="suits">♠ ♥ ♦ ♣</div>
      <h2>مجلس الحزم</h2>
      <p>بطولة شدّة ٢٠٢٦/٢٠٢٧</p>
    </div>
    <span class="login-label">اختر اسمك</span>
    <div class="player-grid" id="player-grid"></div>
    <div id="pin-section" style="display:none">
      <div class="pin-label">أدخل PIN الخاص بك (4 أرقام)</div>
      <div class="pin-display" id="pin-display">
        <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
        <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
      </div>
      <div class="pin-pad">
        <button class="pin-key" onclick="pinKey('1')">1</button>
        <button class="pin-key" onclick="pinKey('2')">2</button>
        <button class="pin-key" onclick="pinKey('3')">3</button>
        <button class="pin-key" onclick="pinKey('4')">4</button>
        <button class="pin-key" onclick="pinKey('5')">5</button>
        <button class="pin-key" onclick="pinKey('6')">6</button>
        <button class="pin-key" onclick="pinKey('7')">7</button>
        <button class="pin-key" onclick="pinKey('8')">8</button>
        <button class="pin-key" onclick="pinKey('9')">9</button>
        <button class="pin-key" onclick="pinClear()">مسح</button>
        <button class="pin-key" onclick="pinKey('0')">0</button>
        <button class="pin-key del" onclick="pinDelete()">⌫</button>
      </div>
      <button class="login-btn" onclick="doLogin()">دخول 🃏</button>
    </div>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-suits">♠ ♥ ♦ ♣</div>
    <h1>مجلس الحزم</h1>
    <div class="subtitle">٢٠٢٦/٢٠٢٧ · بطولة شدّة</div>
    <div class="user-bar">
      <div class="user-badge" id="user-badge">👤 —</div>
      <button class="logout-btn" onclick="doLogout()">خروج</button>
    </div>
    <div class="stats-bar">
      <div class="stat-item"><span class="stat-num" id="h-done">0</span><span class="stat-label">مؤكدة</span></div>
      <div class="stat-item"><span class="stat-num" id="h-rem">45</span><span class="stat-label">متبقية</span></div>
      <div class="stat-item"><span class="stat-num" id="h-leader">—</span><span class="stat-label">المتصدر</span></div>
    </div>
  </header>
  <div class="container">
    <nav>
      <button class="tab-btn active" data-tab="leaderboard">🏆 الترتيب</button>
      <button class="tab-btn" data-tab="matches">🃏 المباريات</button>
      <button class="tab-btn" data-tab="player">👤 لاعب</button>
    </nav>

    <!-- LEADERBOARD -->
    <div id="tab-leaderboard" class="section active">
      <div class="highlight-card" id="leader-card" style="display:none">
        <div class="trophy-icon">🏆</div>
        <div class="leader-name" id="leader-name-display"></div>
        <div class="leader-pts" id="leader-pts-display"></div>
      </div>
      <div class="progress-section">
        <div class="progress-top"><span class="progress-label">تقدم البطولة</span><span class="progress-val" id="progress-pct">0%</span></div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
      </div>
      <div class="scoreboard">
        <div class="scoreboard-header">
          <span class="scoreboard-title">⚡ لوحة النقاط</span>
          <span style="font-size:10px;color:var(--text3)">يُحدَّث فورياً</span>
        </div>
        <div id="scoreboard-list"><div class="loading"><div class="spinner"></div>جاري التحميل...</div></div>
      </div>
    </div>

    <!-- MATCHES -->
    <div id="tab-matches" class="section">
      <div class="search-wrap">
        <input type="text" class="search-box" id="search-box" placeholder="🔍  ابحث: Omar + Ali  أو  23  أو  Glen..." oninput="filterMatches()" autocomplete="off">
        <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
      </div>
      <div class="search-hint" id="search-hint"></div>
      <div class="filter-row">
        <div class="filter-chip active" data-filter="all" onclick="setFilter('all',this)">الكل</div>

// ---- DATA ----
async function loadData(){
  const[mr,cr]=await Promise.all([
    sb.from('matches').select('*').order('id'),
    sb.from('confirmations').select('*'),
  ]);
  if(mr.data)matchesData=mr.data;
  if(cr.data)confirmationsData=cr.data;
  renderAll();
}
let realtimeCh=null;
function setupRealtime(){
  if(realtimeCh)sb.removeChannel(realtimeCh);
  realtimeCh=sb.channel('tournament-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'matches'},()=>loadData())
    .on('postgres_changes',{event:'*',schema:'public',table:'confirmations'},()=>loadData())
    .subscribe();
}
function getPlayerName(id){const p=PLAYERS_DEF.find(x=>x.id===id);return p?p.name:id;}
function getScores(){
  const s={};PLAYERS_DEF.forEach(p=>s[p.id]=0);
  matchesData.forEach(m=>{if(m.locked&&m.winner){const t=m.winner===1?m.team1:m.team2;t.forEach(pid=>{if(s[pid]!==undefined)s[pid]++;});}});
  return s;
}

function renderMatches(){
  const list=document.getElementById('matches-list');
  let html='',currentRound='';
  const filtered=MATCHES_DEF.filter(([num,t1,t2])=>{
    const m=matchesData.find(x=>x.id===num);
    const isLocked=m&&m.locked;
    const isInMatch=[...t1,...t2].includes(currentUser.id);
    if(currentFilter==='mine'&&!isInMatch)return false;
    if(currentFilter==='pending'&&isLocked)return false;
    if(currentFilter==='locked'&&!isLocked)return false;
    if(searchTerm){
      const numSearch=parseInt(searchTerm);
      if(!isNaN(numSearch)&&numSearch>=1&&numSearch<=45){
        // Match by number
        if(num!==numSearch)return false;
      } else {
        const allPlayers=[...t1,...t2];
        const teamSearch=parseTeamSearch(searchTerm);
        if(teamSearch){
          // "Omar+Ali vs Glen+Mohamed" — side1 must be on same team, side2 on other
          const s1inT1=teamSearch.side1.every(q=>t1.some(pid=>fuzzyMatchPlayer(q,pid)));
          const s2inT2=teamSearch.side2.every(q=>t2.some(pid=>fuzzyMatchPlayer(q,pid)));
          const s1inT2=teamSearch.side1.every(q=>t2.some(pid=>fuzzyMatchPlayer(q,pid)));
          const s2inT1=teamSearch.side2.every(q=>t1.some(pid=>fuzzyMatchPlayer(q,pid)));
          if(!(( s1inT1&&s2inT2)||(s1inT2&&s2inT1)))return false;
        } else {
          const terms=parseSearchTerms(searchTerm);
          if(terms.length>=2){
            // All terms must match players in this match
            if(!terms.every(term=>allPlayers.some(pid=>fuzzyMatchPlayer(term,pid))))return false;
          } else if(terms.length===1){
            if(!allPlayers.some(pid=>fuzzyMatchPlayer(terms[0],pid)))return false;
          }
        }
      }
    }
    return true;
  });
  filtered.forEach(([num,t1,t2])=>{
    const rk=Object.keys(ROUND_BREAKS).reverse().find(k=>num>=parseInt(k));
    if(rk&&ROUND_BREAKS[rk]!==currentRound){if(currentRound)html+='</div>';currentRound=ROUND_BREAKS[rk];html+=`<div class="round-section"><div class="round-header"><div class="round-line"></div><div class="round-label">${currentRound}</div><div class="round-line"></div></div>`;}
    const m=matchesData.find(x=>x.id===num);
    const isLocked=m&&m.locked;const winner=m?m.winner:null;
    const confs=confirmationsData.filter(c=>c.match_id===num);
    const allPlayers=[...t1,...t2];
    const isInMatch=allPlayers.includes(currentUser.id);
    const myConf=confs.find(c=>c.player_id===currentUser.id);
    const t1Confs=confs.filter(c=>c.voted_winner===1);
    const t2Confs=confs.filter(c=>c.voted_winner===2);
    const proposedWinner=t1Confs.length>0?1:(t2Confs.length>0?2:null);
    const cardClass=isLocked?'locked':(proposedWinner?'pending-confirm':'');
    const statusBadge=isLocked?`<span class="match-status-badge badge-locked">🔒 مؤكدة</span>`:(proposedWinner?`<span class="match-status-badge badge-pending">⏳ ${confs.length}/4</span>`:`<span class="match-status-badge badge-open">مفتوحة</span>`);
    const t1Names=t1.map(getPlayerName).join(' + ');
    const t2Names=t2.map(getPlayerName).join(' + ');
    let t1c='',t2c='';
    if(isLocked){t1c=winner===1?'winner':'loser';t2c=winner===2?'winner':'loser';}
    else if(proposedWinner){t1c=proposedWinner===1?'winner':'loser';t2c=proposedWinner===2?'winner':'loser';}
    const canVote=isInMatch&&!isLocked&&!myConf;
    const dis=!canVote?'disabled':'';
    let confirmHtml='';
    if(!isLocked&&(proposedWinner||isInMatch)){
      const avatars=allPlayers.map(pid=>{const c=confs.find(x=>x.player_id===pid);return`<span class="confirm-avatar ${c?'confirmed':'pending-conf'}">${c?'✅':'⏳'} ${getPlayerName(pid)}</span>`;}).join('');
      let myBtn='';
      if(isInMatch){
        if(myConf)myBtn=`<button class="my-confirm-btn already">✅ أكدت نتيجتك</button>`;
        else if(proposedWinner){const pn=proposedWinner===1?t1Names:t2Names;myBtn=`<button class="my-confirm-btn" onclick="voteWinner(${num},${proposedWinner})">✓ تأكيد فوز ${pn}</button>`;}
      }else myBtn=`<div class="not-in-match-note">لست في هذه المباراة</div>`;
      confirmHtml=`<div class="confirm-section"><div class="confirm-title">التأكيدات (${confs.length} من 4):</div><div class="confirm-avatars">${avatars}</div>${myBtn}</div>`;
    }
    html+=`<div class="match-card ${cardClass}"><div class="match-num">مباراة ${num} ${statusBadge}</div><div class="match-teams"><button class="team-btn ${t1c}" ${dis} onclick="proposeWinner(${num},1,'${t1.join(',')}','${t2.join(',')}')">${t1Names}</button><span class="vs-badge">VS</span><button class="team-btn ${t2c}" ${dis} onclick="proposeWinner(${num},2,'${t1.join(',')}','${t2.join(',')}')">${t2Names}</button></div>${confirmHtml}</div>`;
  });
  if(currentRound)html+='</div>';
  list.innerHTML=filtered.length===0?'<div style="text-align:center;color:var(--text3);padding:40px;">لا توجد نتائج</div>':html;
}

function renderPlayerStats(){
  const scores=getScores();
  const sorted=PLAYERS_DEF.slice().sort((a,b)=>scores[b.id]-scores[a.id]);
  document.getElementById('player-stats-list').innerHTML=sorted.map(({id,name},i)=>{
    const pts=scores[id];
    const myMatches=MATCHES_DEF.filter(([,t1,t2])=>[...t1,...t2].includes(id));
    const played=myMatches.filter(([n])=>matchesData.find(m=>m.id===n&&m.locked)).length;
    const won=myMatches.filter(([n,t1,t2])=>{const m=matchesData.find(x=>x.id===n&&x.locked);if(!m)return false;return(m.winner===1&&t1.includes(id))||(m.winner===2&&t2.includes(id));}).length;
    const wr=played>0?Math.round((won/played)*100):0;
    return`<div class="scoreboard" style="margin-bottom:9px"><div class="scoreboard-header"><span class="scoreboard-title">${i===0&&pts>0?'🏆 ':''}${name}</span><span style="color:var(--gold2);font-weight:900;font-size:17px">${pts} <span style="font-size:10px;color:var(--text3)">نقطة</span></span></div><div style="padding:11px 14px;display:flex;gap:14px;justify-content:space-around;text-align:center"><div><div style="font-size:18px;font-weight:900;color:var(--text2)">${played}</div><div style="font-size:9px;color:var(--text3)">لعب</div></div><div><div style="font-size:18px;font-weight:900;color:var(--green2)">${won}</div><div style="font-size:9px;color:var(--text3)">فوز</div></div><div><div style="font-size:18px;font-weight:900;color:var(--gold)">${wr}%</div><div style="font-size:9px;color:var(--text3)">نسبة الفوز</div></div><div><div style="font-size:18px;font-weight:900;color:var(--text3)">${9-played}</div><div style="font-size:9px;color:var(--text3)">متبقية</div></div></div></div>`;
  }).join('');
}

// ---- ACTIONS ----
async function proposeWinner(matchNum,team,t1str,t2str){
  if(!currentUser)return;
  const t1=t1str.split(','),t2=t2str.split(','),allPlayers=[...t1,...t2];
  if(!allPlayers.includes(currentUser.id)){showToast('❌ لست في هذه المباراة');return;}
  const existingConfs=confirmationsData.filter(c=>c.match_id===matchNum);
  const myConf=existingConfs.find(c=>c.player_id===currentUser.id);
  if(myConf){showToast('سبق وأكدت نتيجة هذه المباراة');return;}
  if(existingConfs.length>0&&existingConfs[0].voted_winner!==team){showToast('❌ يوجد تصويت مختلف — اتفقوا على نفس الفريق أولاً');return;}
  const{error}=await sb.from('confirmations').insert({match_id:matchNum,player_id:currentUser.id,voted_winner:team});
  if(error){showToast('❌ خطأ: '+error.message);return;}
  const teamNames=team===1?t1.map(getPlayerName).join(' + '):t2.map(getPlayerName).join(' + ');
  showToast(`✅ صوّتت لفوز ${teamNames}`);
  await checkAndLock(matchNum,team,allPlayers);
  loadData();
}

async function voteWinner(matchNum,team){
  if(!currentUser)return;
  const match=MATCHES_DEF.find(([n])=>n===matchNum);
  if(!match)return;
  const allPlayers=[...match[1],...match[2]];
  const myConf=confirmationsData.find(c=>c.match_id===matchNum&&c.player_id===currentUser.id);
  if(myConf){showToast('سبق وأكدت');return;}
  const{error}=await sb.from('confirmations').insert({match_id:matchNum,player_id:currentUser.id,voted_winner:team});
  if(error){showToast('❌ خطأ');return;}
  showToast('✅ تم تأكيدك');
  await checkAndLock(matchNum,team,allPlayers);
  loadData();
}

async function checkAndLock(matchNum,team,allPlayers){
  const{data:fresh}=await sb.from('confirmations').select('*').eq('match_id',matchNum);
  if(!fresh)return;
  const teamConfs=fresh.filter(c=>c.voted_winner===team).map(c=>c.player_id);
  if(allPlayers.every(pid=>teamConfs.includes(pid))){
    const{error}=await sb.rpc('lock_match',{p_match_id:matchNum,p_winner:team});
    if(!error)showToast('🔒 النتيجة مؤكدة ومسجلة نهائياً!');
  }
}

// ---- UI ----
function setFilter(f,el){currentFilter=f;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderMatches();}
function parseSearchTerms(raw){
  // Support: "Omar + Ali vs Glen + Mohamed" or "Omar, Ali" or "Omar Ali"
  // Remove vs/ضد separators and split by common delimiters
  const cleaned=raw.replace(/\bvs\b|\bضد\b/gi,' ');
  return cleaned.split(/[,+&\s]+/).map(s=>s.trim().toLowerCase()).filter(s=>s.length>=2);
}
function fuzzyMatchPlayer(query, playerId){
  const name=getPlayerName(playerId).toLowerCase();
  return name.startsWith(query)||name.includes(query);
}
function parseTeamSearch(raw){
  // Parse "Team1 vs Team2" into {team1:[], team2:[]} or null
  const lower=raw.toLowerCase();
  const vsSplit=lower.split(/\bvs\b|\bضد\b/);
  if(vsSplit.length===2){
    const side1=vsSplit[0].split(/[,+&\s]+/).map(s=>s.trim()).filter(s=>s.length>=2);
    const side2=vsSplit[1].split(/[,+&\s]+/).map(s=>s.trim()).filter(s=>s.length>=2);
    if(side1.length>0&&side2.length>0) return{side1,side2};
  }
  return null;
}
function filterMatches(){
  searchTerm=document.getElementById('search-box').value.trim();
  const clearBtn=document.getElementById('search-clear');
  const hint=document.getElementById('search-hint');
  clearBtn.style.display=searchTerm?'block':'none';
  if(searchTerm){
    const num=parseInt(searchTerm);
    if(!isNaN(num)&&num>=1&&num<=45){
      hint.textContent='🎯 مباراة رقم '+num;
    } else {
      const terms=parseSearchTerms(searchTerm);
      if(terms.length>=2){
        // Try to detect vs pattern: "Omar Ali vs Glen Mohamed"
        const raw=searchTerm.toLowerCase();
        const hasVs=raw.includes(' vs ')||raw.includes(' ضد ');
        if(hasVs){
          hint.textContent='⚔️ البحث عن مباراة بين الفريقين';
        } else {
          hint.textContent='🔍 البحث عن مباراة تجمع: '+terms.join(' + ');
        }
      } else hint.textContent='🔍 '+searchTerm;
    }
  } else { hint.textContent=''; }
  renderMatches();
}
function clearSearch(){
  document.getElementById('search-box').value='';
  searchTerm='';
  document.getElementById('search-clear').style.display='none';
  document.getElementById('search-hint').textContent='';
  renderMatches();
  document.getElementById('search-box').focus();
}
function switchTab(tab){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn,.bnav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.getElementById('tab-'+tab).classList.add('active');
}
document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>switchTab(btn.dataset.tab)));
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

// ---- PWA ----
if('serviceWorker'in navigator){const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))));`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});}
document.querySelector('link[rel="manifest"]').href=URL.createObjectURL(new Blob([JSON.stringify({name:'بطولة مجلس الحزم',short_name:'مجلس الحزم',start_url:'.',display:'standalone',background_color:'#0d0600',theme_color:'#1a0a00',lang:'ar',dir:'rtl'})],{type:'application/json'}));

// ---- INIT ----
buildPlayerGrid();
const saved=sessionStorage.getItem('shadda-user');
if(saved){currentUser=JSON.parse(saved);showApp();}
</script>
