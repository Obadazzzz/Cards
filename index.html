<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a0a00">
<meta name="description" content="بطولة مجلس الحزم ٢٠٢٦/٢٠٢٧ - إدارة البطولة">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="مجلس الحزم">
<link rel="manifest" href="#" id="manifest-link">
<title>🃏 بطولة مجلس الحزم ٢٠٢٦/٢٠٢٧</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0600;
    --bg2: #1a0c02;
    --bg3: #251208;
    --gold: #c8960c;
    --gold2: #f0c040;
    --gold3: #ffd966;
    --red: #b91c1c;
    --red2: #dc2626;
    --green: #15803d;
    --green2: #16a34a;
    --card: #1e1006;
    --card2: #2a1608;
    --border: #3d2007;
    --text: #f5e6cc;
    --text2: #c8a87a;
    --text3: #8a6a40;
    --shadow: 0 8px 40px rgba(0,0,0,0.8);
    --glow-gold: 0 0 20px rgba(200,150,12,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(200,150,12,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(185,28,28,0.08) 0%, transparent 50%);
  }

  /* Floating card suit decorations */
  body::before {
    content: '♠ ♥ ♦ ♣';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 400px;
    color: rgba(255,255,255,0.015);
    white-space: nowrap;
    pointer-events: none;
    z-index: 0;
    letter-spacing: 60px;
  }

  .container { max-width: 900px; margin: 0 auto; padding: 0 16px 100px; position: relative; z-index: 1; }

  /* HEADER */
  header {
    text-align: center;
    padding: 40px 20px 30px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .header-suits {
    font-size: 28px;
    letter-spacing: 12px;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--gold), var(--red2), var(--gold2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 7vw, 60px);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold3) 0%, var(--gold) 50%, var(--gold2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 30px rgba(200,150,12,0.5));
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--text3);
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .stat-item {
    text-align: center;
    padding: 10px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .stat-num {
    font-size: 24px;
    font-weight: 900;
    color: var(--gold2);
    display: block;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* NAV TABS */
  nav {
    display: flex;
    gap: 4px;
    padding: 16px 0;
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    margin: 0 -16px;
  }

  nav::-webkit-scrollbar { display: none; }

  .tab-btn {
    flex-shrink: 0;
    padding: 8px 16px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text3);
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab-btn:hover { border-color: var(--gold); color: var(--gold); }

  .tab-btn.active {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-color: var(--gold);
    color: #1a0c02;
    font-weight: 700;
    box-shadow: 0 0 15px rgba(200,150,12,0.4);
  }

  /* SECTIONS */
  .section { display: none; padding-top: 20px; }
  .section.active { display: block; }

  /* SCOREBOARD */
  .scoreboard {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }

  .scoreboard-header {
    background: linear-gradient(135deg, #2a1608, #1a0c02);
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }

  .scoreboard-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--gold2);
  }

  .player-row {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    border-bottom: 1px solid rgba(61,32,7,0.5);
    gap: 14px;
    transition: background 0.2s;
    cursor: default;
  }

  .player-row:hover { background: var(--card2); }
  .player-row:last-child { border-bottom: none; }

  .rank-badge {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 13px;
    flex-shrink: 0;
  }

  .rank-1 { background: linear-gradient(135deg, #ffd700, #ffb300); color: #1a0a00; }
  .rank-2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #1a0a00; }
  .rank-3 { background: linear-gradient(135deg, #cd7f32, #8b4513); color: #fff; }
  .rank-other { background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }

  .player-name { flex: 1; font-size: 16px; font-weight: 500; }
  .player-name.leader { color: var(--gold2); font-weight: 700; }

  .player-wins {
    font-size: 22px;
    font-weight: 900;
    color: var(--gold);
    min-width: 40px;
    text-align: left;
  }

  .score-bar-wrap { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .score-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--gold), var(--gold2)); transition: width 0.6s ease; }

  /* MATCHES */
  .round-section {
    margin-bottom: 20px;
  }

  .round-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .round-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 2px;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 20px;
  }

  .round-line { flex: 1; height: 1px; background: var(--border); }

  .match-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .match-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--border);
    transition: background 0.2s;
  }

  .match-card.team1-won::before { background: var(--gold2); }
  .match-card.team2-won::before { background: var(--gold2); }

  .match-num {
    font-size: 10px;
    color: var(--text3);
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .match-teams {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .team-btn {
    flex: 1;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    background: var(--bg3);
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    font-family: 'Tajawal', sans-serif;
    color: var(--text2);
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    line-height: 1.4;
  }

  .team-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--card2); }

  .team-btn.winner {
    background: linear-gradient(135deg, rgba(200,150,12,0.2), rgba(240,192,64,0.1));
    border-color: var(--gold);
    color: var(--gold2);
    box-shadow: 0 0 12px rgba(200,150,12,0.3);
  }

  .team-btn.loser {
    opacity: 0.4;
  }

  .vs-badge {
    font-size: 10px;
    font-weight: 900;
    color: var(--text3);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 6px;
    flex-shrink: 0;
  }

  /* RESET BTN */
  .reset-btn {
    background: none;
    border: 1px solid var(--red);
    color: var(--red2);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
    font-size: 13px;
    transition: all 0.2s;
  }

  .reset-btn:hover { background: var(--red); color: #fff; }

  /* PROGRESS */
  .progress-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .progress-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .progress-label { font-size: 13px; color: var(--text3); }
  .progress-val { font-size: 14px; font-weight: 700; color: var(--gold2); }

  .progress-bar-wrap {
    height: 8px;
    background: var(--bg3);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--gold), var(--gold2), var(--gold3));
    transition: width 0.5s ease;
  }

  /* Trophy animation for leader */
  @keyframes glow-pulse {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(200,150,12,0.6)); }
    50% { filter: drop-shadow(0 0 20px rgba(200,150,12,1)); }
  }

  .trophy-icon { animation: glow-pulse 2s ease-in-out infinite; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card2);
    border: 1px solid var(--gold);
    color: var(--gold2);
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    z-index: 1000;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
    box-shadow: 0 0 20px rgba(200,150,12,0.4);
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* BOTTOM NAV (mobile) */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 200;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .bnav-btn {
    flex: 1;
    padding: 12px 4px 10px;
    border: none;
    background: none;
    color: var(--text3);
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
    font-size: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
  }

  .bnav-btn .icon { font-size: 20px; }
  .bnav-btn.active { color: var(--gold2); }
  .bnav-btn:hover { color: var(--gold); }

  /* Filter */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .filter-chip {
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text3);
    border-radius: 20px;
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
    font-size: 12px;
    transition: all 0.2s;
  }

  .filter-chip.active {
    border-color: var(--gold);
    color: var(--gold2);
    background: rgba(200,150,12,0.1);
  }

  /* Search input */
  .search-box {
    width: 100%;
    padding: 10px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s;
    direction: rtl;
  }

  .search-box:focus { border-color: var(--gold); }
  .search-box::placeholder { color: var(--text3); }

  /* Install banner */
  .install-banner {
    background: linear-gradient(135deg, rgba(200,150,12,0.15), rgba(200,150,12,0.05));
    border: 1px solid var(--gold);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    display: none;
  }

  .install-banner.show { display: flex; }
  .install-banner-text { flex: 1; font-size: 13px; color: var(--text2); }
  .install-btn {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #1a0c02;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    cursor: pointer;
    font-size: 13px;
    flex-shrink: 0;
  }

  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--gold2);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .highlight-card {
    background: linear-gradient(135deg, rgba(200,150,12,0.1), rgba(200,150,12,0.03));
    border: 1px solid rgba(200,150,12,0.4);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
    text-align: center;
  }

  .leader-name {
    font-size: 28px;
    font-weight: 900;
    color: var(--gold2);
  }

  .leader-pts {
    font-size: 14px;
    color: var(--text3);
    margin-top: 4px;
  }
</style>
</head>
<body>

<div id="toast" class="toast"></div>
<div id="install-banner" class="install-banner">
  <span class="install-banner-text">📲 أضف التطبيق لشاشتك الرئيسية للوصول السريع</span>
  <button class="install-btn" id="install-btn-action">تثبيت</button>
</div>

<header>
  <div class="header-suits">♠ ♥ ♦ ♣</div>
  <h1>مجلس الحزم</h1>
  <div class="subtitle">٢٠٢٦/٢٠٢٧ · 10 لاعبين · 45 مباراة · النظام الفردي</div>
  <div class="stats-bar">
    <div class="stat-item">
      <span class="stat-num" id="total-matches-done">0</span>
      <span class="stat-label">مباراة منتهية</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" id="remaining-matches">45</span>
      <span class="stat-label">متبقية</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" id="leader-stat">—</span>
      <span class="stat-label">المتصدر</span>
    </div>
  </div>
</header>

<div class="container">
  <!-- Install banner inside container too -->
  <div id="install-banner2" class="install-banner" style="display:none; margin-top:16px;"></div>

  <nav>
    <button class="tab-btn active" data-tab="leaderboard">🏆 الترتيب</button>
    <button class="tab-btn" data-tab="matches">🃏 المباريات</button>
    <button class="tab-btn" data-tab="player">👤 لاعب</button>
  </nav>

  <!-- LEADERBOARD TAB -->
  <div id="tab-leaderboard" class="section active">
    <div class="highlight-card" id="leader-card" style="display:none;">
      <div class="trophy-icon">🏆</div>
      <div class="leader-name" id="leader-name-display"></div>
      <div class="leader-pts" id="leader-pts-display"></div>
    </div>

    <div class="progress-section">
      <div class="progress-top">
        <span class="progress-label">تقدم البطولة</span>
        <span class="progress-val" id="progress-pct">0%</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
    </div>

    <div class="scoreboard">
      <div class="scoreboard-header">
        <span class="scoreboard-title">⚡ لوحة النقاط</span>
        <button class="reset-btn" onclick="confirmReset()">إعادة ضبط</button>
      </div>
      <div id="scoreboard-list"></div>
    </div>
  </div>

  <!-- MATCHES TAB -->
  <div id="tab-matches" class="section">
    <input type="text" class="search-box" id="search-box" placeholder="ابحث عن لاعب..." oninput="filterMatches()">
    <div class="filter-row" id="filter-row">
      <div class="filter-chip active" data-filter="all" onclick="setFilter('all', this)">الكل</div>
      <div class="filter-chip" data-filter="pending" onclick="setFilter('pending', this)">معلقة</div>
      <div class="filter-chip" data-filter="done" onclick="setFilter('done', this)">منتهية</div>
    </div>
    <div id="matches-list"></div>
  </div>

  <!-- PLAYER TAB -->
  <div id="tab-player" class="section">
    <div class="section-title">👤 إحصائيات اللاعبين</div>
    <div id="player-stats-list"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="bnav-btn active" data-tab="leaderboard" onclick="switchTab('leaderboard')">
    <span class="icon">🏆</span>الترتيب
  </button>
  <button class="bnav-btn" data-tab="matches" onclick="switchTab('matches')">
    <span class="icon">🃏</span>المباريات
  </button>
  <button class="bnav-btn" data-tab="player" onclick="switchTab('player')">
    <span class="icon">👤</span>لاعب
  </button>
</div>

  [45,['Mahmoud','Glen'],['Ali','Mohamed']],
];

const ROUND_BREAKS = {1:'الجولة 1–10',11:'الجولة 11–20',21:'الجولة 21–30',31:'الجولة 31–45'};

// ===================== STATE =====================
let state = {};

function loadState() {
  try {
    const s = localStorage.getItem('shadda-tournament-v2');
    if (s) state = JSON.parse(s);
    else state = {};
  } catch(e) { state = {}; }
}

function saveState() {
  localStorage.setItem('shadda-tournament-v2', JSON.stringify(state));
}

function getWinner(matchNum) { return state['m' + matchNum] || null; } // 1 or 2
function setWinner(matchNum, team) {
  if (state['m' + matchNum] === team) {
    delete state['m' + matchNum]; // toggle off
  } else {
    state['m' + matchNum] = team;
  }
  saveState();
}

function getScores() {
  const scores = {};
  PLAYERS.forEach(p => scores[p] = 0);
  MATCHES_RAW.forEach(([num, t1, t2]) => {
    const w = getWinner(num);
    if (w === 1) { t1.forEach(p => scores[p]++); }
    else if (w === 2) { t2.forEach(p => scores[p]++); }
  });
  return scores;
}

// ===================== RENDER =====================
let currentFilter = 'all';
let searchTerm = '';
let currentTab = 'leaderboard';

function getCompletedCount() {
  return MATCHES_RAW.filter(([n]) => state['m' + n]).length;
}

function updateHeader() {
  const done = getCompletedCount();
  const rem = 45 - done;
  document.getElementById('total-matches-done').textContent = done;
  document.getElementById('remaining-matches').textContent = rem;
  const pct = Math.round((done / 45) * 100);
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-bar').style.width = pct + '%';

  const scores = getScores();
  const sorted = PLAYERS.slice().sort((a, b) => scores[b] - scores[a]);
  const leader = sorted[0];
  if (scores[leader] > 0) {
    document.getElementById('leader-stat').textContent = leader;
    document.getElementById('leader-card').style.display = 'block';
    document.getElementById('leader-name-display').textContent = '🏆 ' + leader;
    document.getElementById('leader-pts-display').textContent = scores[leader] + ' نقطة';
  } else {
    document.getElementById('leader-stat').textContent = '—';
    document.getElementById('leader-card').style.display = 'none';
  }
}

function renderScoreboard() {
  const scores = getScores();
  const sorted = PLAYERS.slice().sort((a, b) => scores[b] - scores[a]);
  const max = sorted.reduce((m, p) => Math.max(m, scores[p]), 0) || 1;

  const list = document.getElementById('scoreboard-list');
  list.innerHTML = sorted.map((player, i) => {
    const rank = i + 1;
    const pts = scores[player];
    const barW = max > 0 ? Math.round((pts / max) * 100) : 0;
    let rankClass = 'rank-other';
    if (rank === 1 && pts > 0) rankClass = 'rank-1';
    else if (rank === 2 && pts > 0) rankClass = 'rank-2';
    else if (rank === 3 && pts > 0) rankClass = 'rank-3';
    const isLeader = rank === 1 && pts > 0;

    return `<div class="player-row">
      <div class="rank-badge ${rankClass}">${rank}</div>
      <div class="player-name ${isLeader ? 'leader' : ''}">${player}</div>
      <div class="score-bar-wrap"><div class="score-bar" style="width:${barW}%"></div></div>
      <div class="player-wins">${pts}</div>
    </div>`;
  }).join('');
}

function renderMatches() {
  const list = document.getElementById('matches-list');
  let html = '';
  let currentRound = '';

  const filtered = MATCHES_RAW.filter(([num, t1, t2]) => {
    const w = getWinner(num);
    if (currentFilter === 'pending' && w) return false;
    if (currentFilter === 'done' && !w) return false;
    if (searchTerm) {
      const all = [...t1, ...t2].map(n => n.toLowerCase());
      if (!all.some(n => n.includes(searchTerm.toLowerCase()))) return false;
    }
    return true;
  });

  filtered.forEach(([num, t1, t2]) => {
    const roundKey = Object.keys(ROUND_BREAKS).reverse().find(k => num >= parseInt(k));
    if (roundKey && ROUND_BREAKS[roundKey] !== currentRound) {
      currentRound = ROUND_BREAKS[roundKey];
      html += `<div class="round-section">
        <div class="round-header">
          <div class="round-line"></div>
          <div class="round-label">${currentRound}</div>
          <div class="round-line"></div>
        </div>`;
    }

    const w = getWinner(num);
    let cardClass = '';
    if (w === 1) cardClass = 'team1-won';
    else if (w === 2) cardClass = 'team2-won';

    const t1Class = w === 1 ? 'winner' : (w === 2 ? 'loser' : '');
    const t2Class = w === 2 ? 'winner' : (w === 1 ? 'loser' : '');

    html += `<div class="match-card ${cardClass}">
      <div class="match-num">مباراة ${num}</div>
      <div class="match-teams">
        <button class="team-btn ${t1Class}" onclick="recordWin(${num}, 1)">${t1.join(' + ')}</button>
        <span class="vs-badge">VS</span>
        <button class="team-btn ${t2Class}" onclick="recordWin(${num}, 2)">${t2.join(' + ')}</button>
      </div>
    </div>`;
  });

  if (html) html += '</div>';
  list.innerHTML = filtered.length === 0
    ? '<div style="text-align:center;color:var(--text3);padding:40px;font-size:15px;">لا توجد نتائج</div>'
    : html;
}

function renderPlayerStats() {
  const scores = getScores();
  const container = document.getElementById('player-stats-list');

  const playerData = PLAYERS.map(player => {
    const matches = MATCHES_RAW.filter(([, t1, t2]) => [...t1, ...t2].includes(player));
    const played = matches.filter(([n]) => state['m' + n]).length;
    const won = matches.filter(([n, t1, t2]) => {
      const w = getWinner(n);
      if (w === 1 && t1.includes(player)) return true;
      if (w === 2 && t2.includes(player)) return true;
      return false;
    }).length;
    const winRate = played > 0 ? Math.round((won / played) * 100) : 0;

    return { player, pts: scores[player], played, won, winRate };
  }).sort((a, b) => b.pts - a.pts);

  container.innerHTML = playerData.map(({ player, pts, played, won, winRate }, i) => {
    return `<div class="scoreboard" style="margin-bottom:12px;">
      <div class="scoreboard-header">
        <span class="scoreboard-title">${i === 0 && pts > 0 ? '🏆 ' : ''}${player}</span>
        <span style="color:var(--gold2);font-weight:900;font-size:20px;">${pts} <span style="font-size:12px;color:var(--text3);">نقطة</span></span>
      </div>
      <div style="padding:14px 16px;display:flex;gap:20px;justify-content:space-around;text-align:center;">
        <div>
          <div style="font-size:22px;font-weight:900;color:var(--text2);">${played}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px;">لعب</div>
        </div>
        <div>
          <div style="font-size:22px;font-weight:900;color:var(--green2);">${won}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px;">فوز</div>
        </div>
        <div>
          <div style="font-size:22px;font-weight:900;color:var(--gold);">${winRate}%</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px;">نسبة الفوز</div>
        </div>
        <div>
          <div style="font-size:22px;font-weight:900;color:var(--text3);">${9 - played}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px;">متبقية</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderAll() {
  updateHeader();
  renderScoreboard();
  renderMatches();
  renderPlayerStats();
}

// ===================== ACTIONS =====================
function recordWin(matchNum, team) {
  setWinner(matchNum, team);
  const match = MATCHES_RAW.find(([n]) => n === matchNum);
  const teamPlayers = team === 1 ? match[1] : match[2];
  const w = getWinner(matchNum);
  if (w) {
    showToast(`🏆 فاز ${teamPlayers.join(' و ')}!`);
  } else {
    showToast('تم إلغاء النتيجة');
  }
  renderAll();
}

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderMatches();
}

function filterMatches() {
  searchTerm = document.getElementById('search-box').value;
  renderMatches();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  document.querySelectorAll('.bnav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  document.getElementById('tab-' + tab).classList.add('active');
}

function confirmReset() {
  if (confirm('هل أنت متأكد من إعادة ضبط جميع النتائج؟ لا يمكن التراجع عن هذا الإجراء.')) {
    state = {};
    saveState();
    renderAll();
    showToast('✅ تم إعادة الضبط');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Tab nav
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ===================== PWA =====================
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
  document.getElementById('install-banner').style.display = 'flex';
});

document.getElementById('install-btn-action').addEventListener('click', () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then((choice) => {
      if (choice.outcome === 'accepted') showToast('✅ تم تثبيت التطبيق!');
      deferredPrompt = null;
      document.getElementById('install-banner').style.display = 'none';
    });
  }
});

// Service Worker
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'shadda-v1';
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
  self.skipWaiting();
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
});
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// Manifest
const manifest = {
  name: 'بطولة مجلس الحزم ٢٠٢٦/٢٠٢٧',
  short_name: 'مجلس الحزم',
  description: 'إدارة بطولة مجلس الحزم ٢٠٢٦/٢٠٢٧ - 10 لاعبين',
  start_url: '.',
  display: 'standalone',
  background_color: '#0d0600',
  theme_color: '#1a0a00',
  lang: 'ar',
  dir: 'rtl',
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' fill='%231a0c02'/><text y='140' x='20' font-size='130'>🃏</text></svg>", sizes: '192x192', type: 'image/svg+xml' }
  ]
};

const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
const manifestUrl = URL.createObjectURL(manifestBlob);
document.querySelector('link[rel="manifest"]').href = manifestUrl;

// ===================== INIT =====================
loadState();
renderAll();
</script>
</body>
</html>
